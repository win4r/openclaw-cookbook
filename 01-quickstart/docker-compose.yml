# OpenClaw Gateway — Docker Compose quickstart
#
# Usage:
#   1. Copy .env.example to ~/.openclaw/.env and fill in your API key(s)
#   2. Run: docker compose up -d
#   3. Test: curl http://localhost:18789/health
#
# The ~/.openclaw directory is mounted as a volume so configuration
# and workspace files persist across container restarts.

services:
  openclaw:
    image: node:22-slim
    container_name: openclaw-gateway
    working_dir: /app
    command: >
      sh -c "npm install -g openclaw &&
             openclaw init --defaults --skip-if-exists &&
             openclaw start --no-daemon"
    ports:
      - "18789:18789"
    volumes:
      - "${HOME}/.openclaw:/root/.openclaw"
    env_file:
      - "${HOME}/.openclaw/.env"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
